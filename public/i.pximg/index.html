<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#0d0d12"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <title>Pixiv原图i.pximg.net</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <div id="fullscreenPreview" class="fullscreen-preview"></div>
    
    <div id="contentPreviewPanel" class="content-preview-panel">
        <div class="content-preview-header">
            <h3>内容预览</h3>
            <button class="content-preview-close" id="closeContentPreviewBtn_header">×</button>
        </div>
        <div class="content-preview-body">
            <div id="contentPreviewText" class="content-preview-text"></div>
            <div id="contentPreviewLinks" class="content-preview-links"></div>
        </div>
        <div class="content-preview-footer">
            <button class="btn-recursive" id="processSelectedLinkBtn">加载选中链接</button>
            <button class="btn-close-preview" id="closeContentPreviewBtn_footer">关闭</button>
        </div>
    </div>
    
    <div id="floatingMenu" class="floating-menu">
        <button class="floating-menu-toggle" id="toggleFloatingMenuBtn" title="展开菜单">☰</button>
        <div class="mini-pager" id="miniPager">
            <button id="miniPagerPrevBtn" class="mini-pager-btn">◀</button>
            <div class="mini-page-indicator">
                <span>P</span>
                <input type="number" id="miniUrlPageInput" value="1" min="1"/>
            </div>
            <button id="miniPagerNextBtn" class="mini-pager-btn">▶</button>
        </div>
        <div class="floating-menu-content" id="floatingMenuContent">
            <div class="menu-header">
                <span class="menu-title">Pixiv Viewer</span>
                <select id="proxySelect" class="header-proxy-select">
                    <!-- Proxies will be populated by JS -->
                    <option value="custom">自定义</option>
                </select>
                <button class="menu-collapse-btn" id="collapseMenuBtn" title="收起">━</button>
            </div>
            <!-- API Mode Select for customProxyInput -->
            <select id="apiModeSelect" class="compact-input" style="display:none; width: 100%; margin-bottom: 4px; background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--border-primary); padding: 6px 10px;">
                <option value="" disabled selected>选择API模式</option>
                <!-- Options populated by JS -->
            </select>
            <input type="url" id="customProxyInput" class="custom-proxy-input compact-input" placeholder="自定义地址 / 输入 'api'"/>
            <div class="menu-row">
                <input type="url" id="urlInput" class="compact-input flex-1" placeholder="输入Pixiv原图链接..."/>
            </div>
            <div class="menu-row actions-row">
                <button id="processLinkBtn" class="btn-action btn-load">加载</button>
                <select id="apiCategorySelect" class="compact-select" style="display: none;">
                    <option value="random">随机</option>
                    <!-- Categories will be populated by JS -->
                </select>
                <button id="loadApiImageBtn" class="btn-action btn-random" style="display: none;">加载API</button>
                <button id="copyConvertedLinkBtn" class="btn-action btn-copy">复制</button>
            </div>
            <div class="menu-row pager-row-compact">
                <button id="pagerPrevBtn" class="pager-btn-compact">◀</button>
                <div class="page-indicator-compact">
                    <span>P</span>
                    <input type="number" id="urlPageInput" value="1" min="1"/>
                </div>
                <button id="pagerNextBtn" class="pager-btn-compact">▶</button>
            </div>
        </div>
    </div>

    <div class="preview-controls">
        <button id="cacheManagerBtn" class="visible" title="缓存管理">C</button>
        <button id="downloadBtnMinimal" title="下载">↓</button>
        <button id="openInNewTabBtnMinimal" title="新标签页打开">↗</button>
        <button id="toggleDetailsBtn" title="详情">i</button>
    </div>

    <div id="quickAccessContainer" class="quick-access-container">
        <button id="quickAccessBtn" class="quick-access-btn" title="静态资源">S</button>
        <button id="galleryBtn" class="quick-access-btn" title="图库">G</button>
        <button id="galleryRandomBtn" class="quick-access-btn" title="图库随机">R</button>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    

    <div id="detailsPanel" class="details-panel">
        <h3>详情</h3>
        <div id="detailsGridMinimal" class="details-grid"></div>
    </div>

    <div class="container" style="display:none;">
        <h1>Pixiv原图 <br> i.pximg.net</h1>

        <div id="errorMsg" class="error" style="display: none;"></div>
        <div id="infoMsg" class="info" style="display: none;"></div>

        <div id="resultLinkContainer" class="result-link-container" style="display: none;">
            <span class="result-link-label">链接：</span>
            <div id="resultLink" class="result-link"></div>
        </div>

        <div id="imageContainer" class="image-container" style="display: none;">
            <div class="image-label">图片：</div>
            <div class="image-wrapper" id="imageWrapper">
                <div id="loadingIndicator" style="display: none; padding: 20px;">
                    <span class="loading"></span>
                    <span id="loadingText">加载中...</span>
                    <div id="progressContainer" style="margin-top: 10px; width: 100%; max-width: 300px; height: 5px; background: #3a3a4a; border-radius: 3px; overflow: hidden; display: none;">
                        <div id="progressBar" style="width: 0%; height: 100%; background: #6a5acd; transition: width 0.1s;"></div>
                    </div>
                    <div id="progressStats" style="font-size: 12px; color: #b19cd9; margin-top: 5px; display: none;">0%</div>
                </div>
                <img id="resultImage" src="" alt="Pixiv图片" style="display: none;" />
            </div>
            <div class="button-container">
                <button id="downloadBtn" class="show-original-btn">下载</button>
            </div>
        </div>

        <div id="detailsContainer" class="details-container">
            <h3 style="margin-top: 0; color: #b19cd9; margin-bottom: 10px;">详情</h3>
            <div id="detailsGrid" class="details-grid"></div>
        </div>
    </div>

    <!-- 静态资源页面 -->
    <div id="secretSettings" class="secret-settings" style="display: none;">
        <div class="secret-settings-content">
            <div class="modal-header" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
                <h2 class="modal-title" style="margin-right: 20px;">静态资源</h2>
                
                <!-- Tabs moved to header -->
                <div class="tabs-nav" style="margin-bottom: 0; border-bottom: none; flex: 1;">
                    <button class="tab-btn active" id="staticResourceBtn">通用资源</button>
                    <button class="tab-btn" id="anotherBtn">PikPak</button>
                </div>

                <button class="modal-close" id="closeSecretSettingsBtn">✕</button>
            </div>
            
            <div style="width: 100%; height: 1px; background: var(--border-secondary); margin-bottom: 20px;"></div>
            
            <!-- 静态资源部分 -->
            <div id="staticResourceSection">
                <div class="form-group">
                    <label for="secretProxySelect" class="form-label">服务器节点</label>
                    <select id="secretProxySelect" class="form-select">
                        <!-- Proxies will be populated by JS -->
                        <option value="custom">自定义</option>
                    </select>
                </div>
                
                <div class="form-group" id="secretCustomProxyGroup" style="display: none;">
                     <input 
                        type="url" 
                        id="secretCustomProxyInput" 
                        class="form-input"
                        placeholder="请输入自定义网址，例如：https://prox.mydomain.com/"
                    />
                </div>

                <div class="form-group">
                    <label for="secretInput" class="form-label">资源路径 / 链接</label>
                    <input 
                        type="text" 
                        id="secretInput" 
                        class="form-input"
                        placeholder="请输入静态资源链接..."
                    />
                </div>
            </div>
            
            <!-- 另一个静态资源部分 -->
            <div id="anotherSection" style="display: none;">
                <div class="form-group">
                    <label for="anotherInput" class="form-label">链接地址</label>
                    <input 
                        type="text" 
                        id="anotherInput" 
                        class="form-input"
                        placeholder="请输入链接..."
                    />
                </div>
            </div>
            
            <div style="margin-top: auto; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-secondary" onclick="document.getElementById('closeSecretSettingsBtn').click()">取消</button>
                <button class="btn-primary" id="handleSecretActionBtn">执行操作</button>
            </div>
        </div>
    </div>

        <!-- Gallery Browser Modal -->
    <div id="galleryBrowser" class="secret-settings" style="display: none;">
        <div class="secret-settings-content" style="max-width: 1200px; width: 95%; height: 90vh;">
            <div class="modal-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <h2 class="modal-title">图库浏览</h2>
                    <button id="pickRandomImageBtn" class="btn-primary" style="font-size: 0.8rem; padding: 4px 10px;">🎲 随机</button>
                    <label class="thumb-option" for="useThumbCheckbox" style="font-size: 0.8rem; background: transparent; border: none; padding: 0;">
                        <input type="checkbox" id="useThumbCheckbox" /> 缩略图
                    </label>
                </div>
                <button class="modal-close" id="closeGalleryBrowserBtn">✕</button>
            </div>
            
            <div class="gallery-layout">
                <div class="gallery-sidebar">
                    <div class="form-group">
                        <label class="form-label">数据源</label>
                        <select id="galleryCsvSelect" class="form-select">
                            <!-- Options injected via JS -->
                        </select>
                        <input type="file" id="localCsvInput" accept=".csv" style="display:none;">
                    </div>

                    <div class="form-group">
                        <label class="form-label">搜索</label>
                        <input type="text" id="gallerySearch" class="form-input" placeholder="标题、描述、ID...">
                    </div>
                
                    <div class="form-group">
                        <label class="form-label">排序</label>
                        <select id="gallerySort" class="form-select">
                            <option value="newest">📅 日期最新</option>
                            <option value="oldest">📅 日期最早</option>
                            <option value="id_desc">🔢 ID 降序</option>
                            <option value="id_asc">🔢 ID 升序</option>
                            <option value="view_desc">👁️ 浏览最多</option>
                            <option value="like_desc">❤️ 收藏最多</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">标签筛选</label>
                        <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                            <button id="openTagInclude" class="btn-secondary" style="flex: 1; font-size: 0.8rem;">包含...</button>
                            <button id="openTagExclude" class="btn-secondary" style="flex: 1; font-size: 0.8rem;">排除...</button>
                        </div>
                        <div id="tagIncludePanel" class="tag-panel"></div>
                        <div id="tagExcludePanel" class="tag-panel"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">已选标签</label>
                        <div style="background: var(--bg-input); border: 1px solid var(--border-secondary); border-radius: var(--radius-md); padding: 8px;">
                            <div style="margin-bottom: 5px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px;">
                                <span style="font-size: 0.8rem; color: var(--text-muted);">包含:</span>
                                <select id="tagIncludeLogic" style="background: transparent; border: 1px solid var(--border-primary); color: var(--accent-purple); font-size: 0.8rem; outline: none; padding: 0 4px; border-radius: 4px;">
                                    <option value="OR">任一</option>
                                    <option value="AND">所有</option>
                                </select>
                                <div id="selectedInclude" class="selected-tags" style="display: inline-flex;"></div>
                            </div>
                            <div style="margin-bottom: 5px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px;">
                                <span style="font-size: 0.8rem; color: var(--text-muted);">排除:</span>
                                <div id="selectedExclude" class="selected-tags" style="display: inline-flex;"></div>
                            </div>
                            <button id="clearSelectedTags" class="btn-secondary" style="width: 100%; font-size: 0.8rem; padding: 4px;">清空标签</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">显示选项</label>
                        <div style="display: flex; gap: 5px;">
                            <select id="galleryAiFilter" class="form-select">
                                <option value="">🤖 AI: 全部</option>
                                <option value="YES">AI: 是</option>
                                <option value="NO">AI: 否</option>
                            </select>
                            <select id="galleryDateFormat" class="form-select">
                                <option value="raw">原始日期</option>
                                <option value="local">本地格式</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="galleryStatus" style="color: var(--text-muted); font-size: 0.8rem; word-break: break-all;"></div>
                </div>

                <!-- Main: Table -->
                <div class="gallery-main">
                    <div class="gallery-table-wrapper">
                        <table class="gallery-table">
                            <thead>
                                <tr>
                                    <th class="th-center action-col">操作</th>
                                    <th class="th-left">ID</th>
                                    <th class="th-left">标题</th>
                                    <th class="th-left">描述</th>
                                    <th class="th-left">文件名</th>
                                    <th class="th-left">标签</th>
                                    <th class="th-left">页码</th>
                                    <th class="th-left">限制级</th>
                                    <th class="th-left">日期</th>
                                    <th class="th-left">浏览</th>
                                    <th class="th-left">收藏</th>
                                </tr>
                            </thead>
                            <tbody id="galleryTableBody">
                                <!-- Data injected via JS -->
                            </tbody>
                        </table>
                    </div>
                    
                    <div id="galleryLoading" style="text-align: center; padding: 20px; display: none;">
                        <span class="loading"></span>
                    </div>

                    <!-- Pagination Controls -->
                    <div id="galleryPagination" style="display: flex; align-items: center; gap: 10px; padding-top: 10px; border-top: 1px solid var(--border-secondary);">
                        <select id="perPageSelect" class="form-select" style="width: auto;">
                            <option value="50" selected>50 / 页</option>
                            <option value="100">100 / 页</option>
                            <option value="200">200 / 页</option>
                        </select>
                        <div style="display: flex; gap: 5px; margin-left: auto;">
                            <button id="prevPageBtn" class="btn-secondary">上一页</button>
                            <span id="pageInfo" style="display: flex; align-items: center; font-size: 0.9rem; color: var(--text-muted);">1 / 1</span>
                            <button id="nextPageBtn" class="btn-secondary">下一页</button>
                        </div>
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <input id="pageInput" type="number" min="1" value="1" class="form-input" style="width: 60px; text-align: center;">
                            <button id="jumpPageBtn" class="btn-secondary">跳转</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    

    

    <!-- Cache Management Modal -->
    <div id="cacheManager" class="secret-settings" style="display: none;">
        <div class="secret-settings-content" style="max-width: 800px; width: 90%; height: 80vh; display: flex; flex-direction: column;">
            <div class="modal-header" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
                <h2 class="modal-title" style="margin-right: auto;">缓存管理</h2>
                <button class="modal-close" id="closeCacheManagerBtn">✕</button>
            </div>
            
            <div style="width: 100%; height: 1px; background: var(--border-secondary); margin-bottom: 20px;"></div>
            
            <div class="gallery-body" style="flex: 1; min-height: 0; display: flex; flex-direction: column;">
                <div class="cache-controls" style="display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
                    <button id="refreshCacheBtn" class="btn-secondary" style="font-size: 0.8rem;">刷新列表</button>
                    <button id="clearCacheBtn" class="btn-secondary" style="background: var(--accent-red-bg); color: var(--accent-red); font-size: 0.8rem;">清空缓存</button>
                    <button id="deleteSelectedCacheBtn" class="btn-secondary" style="background: var(--accent-red-bg); color: var(--accent-red); font-size: 0.8rem;">删除选中</button>
                    <div id="cacheStats" style="margin-left: auto; align-self: center; font-size: 12px; color: var(--text-muted);"></div>
                </div>

                <div class="gallery-table-wrapper">
                    <table class="gallery-table" id="cacheTable">
                        <thead>
                            <tr>
                                <th class="th-center" style="width: 40px;"><input type="checkbox" id="selectAllCache"></th>
                                <th class="th-left">URL / 文件名</th>
                                <th class="th-left">大小</th>
                                <th class="th-left">类型</th>
                                <th class="th-left">时间</th>
                                <th class="th-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="cacheTableBody">
                            <!-- Cache items will be populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
