<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素排序变换 - Pixel Sort Morph</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0d0d1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 20px 40px;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
  }
  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #6c63ff, #00d2a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 2px;
  }
  header p {
    font-size: 0.85rem;
    color: #888;
  }

  .main-layout {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    width: 100%;
    max-width: 1100px;
    justify-content: center;
  }

  /* ── Left panel: uploads ──────────────── */
  .left-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 220px;
    flex-shrink: 0;
  }
  .upload-panel {
    background: #151528;
    border-radius: 14px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    border: 1px solid #252540;
  }
  .upload-panel h3 {
    font-size: 0.9rem;
    color: #aaa;
    letter-spacing: 0.5px;
  }
  .upload-zone {
    width: 100%;
    aspect-ratio: 1;
    border: 2px dashed #333355;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    overflow: hidden;
    background: #0d0d1f;
  }
  .upload-zone:hover { border-color: #6c63ff; background: #12122a; }
  .upload-zone.has-image { border-style: solid; border-color: #333355; }
  .upload-zone img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .upload-zone .placeholder { text-align: center; color: #555; pointer-events: none; }
  .upload-zone .placeholder .icon { font-size: 1.6rem; margin-bottom: 4px; display: block; }
  .upload-zone .placeholder span { font-size: 0.8rem; }

  .upload-panel label.file-btn {
    display: inline-block;
    padding: 7px 18px;
    background: #6c63ff;
    color: #fff;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.2s;
  }
  .upload-panel label.file-btn:hover { background: #5a52e0; }
  .upload-panel input[type="file"] { display: none; }
  .upload-panel .info { font-size: 0.7rem; color: #666; text-align: center; }

  /* ── Right panel: canvas + controls ───── */
  .right-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    flex: 1;
    min-width: 0;
  }

  .canvas-wrapper {
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #252540;
    box-shadow: 0 0 80px rgba(108, 99, 255, 0.12);
    line-height: 0;
    position: relative;
  }
  canvas#mainCanvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, #6c63ff, #00d2a0);
    border-radius: 0 0 16px 16px;
    width: 0%;
    transition: width 0.05s linear;
    pointer-events: none;
  }

  .status {
    text-align: center;
    font-size: 0.8rem;
    color: #666;
    min-height: 20px;
    transition: color 0.2s;
  }
  .status.ready { color: #00d2a0; }
  .status.animating { color: #6c63ff; }
  .status.recording { color: #ff6b6b; }

  .perf-info {
    text-align: center;
    font-size: 0.65rem;
    color: #444;
    min-height: 14px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: center;
    background: #151528;
    border-radius: 12px;
    padding: 14px 20px;
    border: 1px solid #252540;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: center;
  }
  .control-group label {
    font-size: 0.7rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .control-group select,
  .control-group input[type="range"] {
    background: #1a1a30;
    border: 1px solid #333355;
    color: #e0e0e0;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .control-group select { min-width: 120px; }
  .control-group input[type="range"] {
    width: 90px;
    -webkit-appearance: none;
    appearance: none;
    height: 5px;
    background: #252540;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    background: #6c63ff;
    border-radius: 50%;
    cursor: pointer;
  }
  .control-group .range-value {
    font-size: 0.75rem;
    color: #aaa;
  }

  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s, background 0.2s, color 0.2s, border-color 0.2s;
    letter-spacing: 0.5px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-transform {
    background: linear-gradient(135deg, #6c63ff, #00d2a0);
    color: #fff;
    font-size: 1rem;
    padding: 12px 32px;
    box-shadow: 0 4px 20px rgba(108, 99, 255, 0.3);
  }
  .btn-transform:hover:not(:disabled) { box-shadow: 0 6px 30px rgba(108, 99, 255, 0.5); }

  .btn-reset {
    background: #252540;
    color: #ccc;
  }
  .btn-reset:hover:not(:disabled) { background: #303055; }

  .btn-toggle {
    background: #1a1a30;
    color: #777;
    border: 1px solid #333355;
    padding: 7px 14px;
    font-size: 0.8rem;
    font-weight: 500;
    border-radius: 20px;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .btn-toggle:hover:not(:disabled) { border-color: #6c63ff; color: #aaa; }
  .btn-toggle.active {
    background: rgba(108, 99, 255, 0.2);
    color: #b8b0ff;
    border-color: #6c63ff;
    box-shadow: 0 0 14px rgba(108, 99, 255, 0.25);
  }

  .btn-export {
    background: #1a1a30;
    color: #777;
    border: 1px solid #333355;
    padding: 7px 14px;
    font-size: 0.8rem;
    font-weight: 500;
    border-radius: 20px;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .btn-export:hover:not(:disabled) { border-color: #00d2a0; color: #aaa; }

  .btn-gif {
    background: #1a1a30;
    color: #ff6b6b;
    border: 1px solid #ff6b6b;
    padding: 7px 14px;
    font-size: 0.8rem;
    font-weight: 500;
    border-radius: 20px;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .btn-gif:hover:not(:disabled) { background: rgba(255, 107, 107, 0.1); }
  .btn-gif.recording {
    background: #ff6b6b;
    color: #fff;
    animation: pulse 1s infinite;
  }
  .color-pickers {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .color-pickers label {
    font-size: 0.7rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .color-pickers input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 32px;
    height: 32px;
    border: 2px solid #333355;
    border-radius: 6px;
    cursor: pointer;
    background: none;
    padding: 2px;
  }
  .color-pickers input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .color-pickers input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }
  .color-pickers .arrow { color: #555; font-size: 0.8rem; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .btn-webgl {
    background: #1a1a30;
    color: #00d2a0;
    border: 1px solid #00d2a0;
    padding: 7px 14px;
    font-size: 0.8rem;
    font-weight: 500;
    border-radius: 20px;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .btn-webgl:hover:not(:disabled) { background: rgba(0, 210, 160, 0.1); }
  .btn-webgl.active {
    background: rgba(0, 210, 160, 0.2);
    color: #00d2a0;
    box-shadow: 0 0 14px rgba(0, 210, 160, 0.25);
  }

  .gif-progress {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #151528;
    border: 1px solid #333355;
    border-radius: 12px;
    padding: 24px 32px;
    z-index: 1000;
    display: none;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .gif-progress.show { display: block; }
  .gif-progress h4 {
    margin-bottom: 12px;
    color: #ff6b6b;
  }
  .gif-progress-bar {
    width: 200px;
    height: 6px;
    background: #252540;
    border-radius: 3px;
    overflow: hidden;
    margin: 0 auto;
  }
  .gif-progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
    width: 0%;
    transition: width 0.1s linear;
  }
  .gif-progress-text {
    margin-top: 8px;
    font-size: 0.75rem;
    color: #888;
  }

  @media (max-width: 850px) {
    body { padding: 10px 10px 20px; }
    header { margin-bottom: 10px; }
    header h1 { font-size: 1.3rem; }
    header p { font-size: 0.75rem; }
    .main-layout { flex-direction: column; align-items: center; gap: 10px; }
    .left-panel { flex-direction: row; width: 100%; max-width: 500px; gap: 8px; }
    .upload-panel { flex: 1; padding: 10px; gap: 6px; border-radius: 10px; }
    .upload-panel h3 { font-size: 0.75rem; }
    .upload-zone { border-radius: 8px; }
    .left-panel .upload-zone { aspect-ratio: unset; height: 80px; }
    .upload-panel label.file-btn { font-size: 0.75rem; padding: 5px 12px; }
    .upload-panel .info { font-size: 0.65rem; }
    .right-panel { width: 100%; gap: 8px; }
    .canvas-wrapper { border-radius: 10px; }
    .controls { padding: 10px 12px; gap: 8px; border-radius: 10px; }
    .btn { font-size: 0.78rem; padding: 8px 16px; }
    .btn-transform { font-size: 0.9rem; padding: 10px 22px; }
    .btn-toggle, .btn-export, .btn-gif, .btn-webgl { font-size: 0.72rem; padding: 6px 10px; }
    .control-group label { font-size: 0.65rem; }
    .control-group select, .control-group input[type="range"] { font-size: 0.75rem; padding: 4px 6px; }
    .control-group select { min-width: 100px; }
    .control-group input[type="range"] { width: 70px; }
    .status { font-size: 0.7rem; min-height: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>Pixel Sort Morph Pro</h1>
  <p>上传两张图片 — 用像素排序的方式将第一张图的像素重新排列，拼出第二张图</p>
</header>

<div class="main-layout">

  <!-- ── Left: upload panels ────────────── -->
  <div class="left-panel">
    <div class="upload-panel">
      <h3>图片 A（源）</h3>
      <div class="upload-zone" id="zoneA">
        <div class="placeholder"><span class="icon">🖼️</span><span>点击或拖拽上传</span></div>
      </div>
      <label class="file-btn" for="fileA">选择图片 A</label>
      <input type="file" id="fileA" accept="image/*">
      <div class="info" id="infoA"></div>
    </div>

    <div class="upload-panel">
      <h3>图片 B（目标）</h3>
      <div class="upload-zone" id="zoneB">
        <div class="placeholder"><span class="icon">🖼️</span><span>点击或拖拽上传</span></div>
      </div>
      <label class="file-btn" for="fileB">选择图片 B</label>
      <input type="file" id="fileB" accept="image/*">
      <div class="info" id="infoB"></div>
    </div>
  </div>

  <!-- ── Right: canvas + controls ───────── -->
  <div class="right-panel">
    <div class="canvas-wrapper">
      <canvas id="mainCanvas"></canvas>
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status" id="status">请先上传两张图片</div>
    <div class="perf-info" id="perfInfo"></div>
    <div class="controls">
      <div class="control-group">
        <label>分辨率</label>
        <input type="range" id="resolution" min="50" max="300" value="120" step="10">
        <span class="range-value" id="resVal">120×120</span>
      </div>
      <div class="control-group">
        <label>排序依据</label>
        <select id="sortMethod">
          <option value="luminance">明度</option>
          <option value="saturation">饱和度</option>
          <option value="hue">色相</option>
          <option value="red">红色通道</option>
          <option value="green">绿色通道</option>
          <option value="blue">蓝色通道</option>
          <option value="rgbSum">RGB 总和</option>
          <option value="edge">边缘强度</option>
          <option value="luminanceHue">明度+色相</option>
        </select>
      </div>
      <div class="control-group">
        <label>动画时长</label>
        <select id="duration">
          <option value="1500">1.5 秒</option>
          <option value="2500" selected>2.5 秒</option>
          <option value="4000">4 秒</option>
          <option value="6000">6 秒</option>
        </select>
      </div>
      <div class="color-pickers">
        <label>渐变色</label>
        <input type="color" id="gradColor1" value="#ffffff" title="渐变起始色">
        <span class="arrow">→</span>
        <input type="color" id="gradColor2" value="#000000" title="渐变终止色">
      </div>
      <button class="btn btn-webgl" id="btnWebGL">⚡ WebGL</button>
      <button class="btn btn-toggle" id="btnTrail">✨ 拖尾效果</button>
      <button class="btn btn-toggle" id="btnBgImgA">🖼️ 背景图A</button>
      <button class="btn btn-transform" id="btnTransform" disabled>⟳ 开始变换</button>
      <button class="btn btn-reset" id="btnReset" disabled>↺ 重置</button>
      <button class="btn btn-export" id="btnExport" disabled>💾 导出图片</button>
      <button class="btn btn-gif" id="btnGif" disabled>🎬 导出 GIF</button>
    </div>
  </div>
</div>

<!-- GIF Export Progress -->
<div class="gif-progress" id="gifProgress">
  <h4>正在生成 GIF...</h4>
  <div class="gif-progress-bar">
    <div class="gif-progress-bar-inner" id="gifProgressBar"></div>
  </div>
  <div class="gif-progress-text" id="gifProgressText">0%</div>
</div>

<script>
// gif.js 0.2.0 - inlined for file:// protocol compatibility
// Main library
// gif.js 0.2.0 - https://github.com/jnordberg/gif.js

  // ── State ─────────────────────────────────

  let originalImgB = null;

  // SoA Data Layout
  let pixelCount = 0;

  const BG_DARK = (255 << 24) | (20 << 16) | (8 << 8) | 10;
  let bgPixels32 = null;
  let trailCanvas = null;
  let trailCtx = null;

  // WebGL Context
  let gl = null;
  let glProgram = null;
  let glBuffers = {};

  // ── Responsive canvas display sizing ──────
  function getDisplaySize() {
    const isMobile = window.innerWidth <= 850;
    if (isMobile) {
      return Math.min(window.innerWidth - 20, window.innerHeight - 270, 500);
    }
    return Math.min(580, window.innerWidth - 300, window.innerHeight - 280);
  }

  // ── Helpers ───────────────────────────────
  const getResolution = () => parseInt(resSlider.value);
  const getSortMethod = () => sortSelect.value;
  const getDuration = () => parseInt(durSelect.value);

  /**
   * ── Extended Sort Keys ────────────────────
   * 
   * 新增排序维度：
   * - rgbSum: RGB 通道总和，简单亮度近似
   * - edge: Sobel 边缘检测强度，按边缘清晰度排序
   * - luminanceHue: 明度+色相组合键，二维特征排序
   */
  function computeSortKeys(data, size, method) {
    const count = size * size;
    const keys = new Float32Array(count);

    // 预计算边缘强度（如果需要）
    let edgeData = null;
    if (method === 'edge') {
      edgeData = computeEdgeStrength(data, size);
    }

    for (let i = 0; i < count; i++) {
      const off = i << 2;
      const r = data[off], g = data[off + 1], b = data[off + 2];

      switch (method) {
        case 'luminance':
          keys[i] = 0.299 * r + 0.587 * g + 0.114 * b;
          break;
        case 'saturation': {
          const max = r > g ? (r > b ? r : b) : (g > b ? g : b);
          const min = r < g ? (r < b ? r : b) : (g < b ? g : b);
          keys[i] = max === 0 ? 0 : (max - min) / max;
          break;
        }
        case 'hue': {
          const max = r > g ? (r > b ? r : b) : (g > b ? g : b);
          const min = r < g ? (r < b ? r : b) : (g < b ? g : b);

          else if (max === g) keys[i] = ((b - r) / d + 2) / 6;
          else                keys[i] = ((r - g) / d + 4) / 6;
          break;
        }
        case 'red':   keys[i] = r; break;
        case 'green': keys[i] = g; break;
        case 'blue':  keys[i] = b; break;

          keys[i] = r + g + b;
          break;
        case 'edge':
          keys[i] = edgeData[i];
          break;

          const min = r < g ? (r < b ? r : b) : (g < b ? g : b);
          let hue = 0;
          if (max !== min) {
            const d = max - min;
            if (max === r)      hue = ((g - b) / d + (g < b ? 6 : 0)) / 6;

            else                hue = ((r - g) / d + 4) / 6;

   * ── Edge Detection (Sobel) ────────────────
   * 
   * 使用 Sobel 算子计算每个像素的边缘强度
   * Gx = [-1 0 1; -2 0 2; -1 0 1]
   * Gy = [-1 -2 -1; 0 0 0; 1 2 1]
   * magnitude = sqrt(Gx² + Gy²)

    const edge = new Float32Array(size * size);
    const gray = new Float32Array(size * size);

    // 转为灰度

          -1 * gray[(y+1) * size + (x-1)] + 1 * gray[(y+1) * size + (x+1)];

      edge[(size-1) * size + x] = 0;
    }

      edge[y * size] = 0;
      edge[y * size + size - 1] = 0;
    }

  // ── Image processing ──────────────────────
  function fileToImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('图片加载失败'));

    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const octx = c.getContext('2d');
    const iw = img.naturalWidth, ih = img.naturalHeight;
    let sx, sy, sw, sh;
    if (iw >= ih) {
      sh = ih; sw = ih; sx = (iw - sw) / 2; sy = 0;

      sw = iw; sh = iw; sx = 0; sy = (ih - sh) / 2;

    colorsG = new Uint8Array(count);
    colorsB = new Uint8Array(count);

    srcY = new Float32Array(count);

    deltaY = new Float32Array(count);

    }

    // Upload pixel data to GPU
    uploadWebGLData(size);
  }

  function createWebGLProgram() {
    const vertexShaderSource = `#version 300 es
      in vec2 a_position;
      in vec3 a_color;
      in vec2 a_srcPos;
      in vec2 a_delta;
      
      uniform float u_progress;
      uniform vec2 u_resolution;
      
      out vec3 v_color;
      
      void main() {
        vec2 currentPos = a_srcPos + a_delta * u_progress;
        vec2 clipPos = (currentPos / u_resolution) * 2.0 - 1.0;
        gl_Position = vec4(clipPos.x, -clipPos.y, 0.0, 1.0);
        gl_PointSize = max(1.0, 600.0 / u_resolution.x);
        v_color = a_color / 255.0;
      }
    `;

    const fragmentShaderSource = `#version 300 es
      precision highp float;
      in vec3 v_color;
      out vec4 fragColor;
      
      void main() {
        fragColor = vec4(v_color, 1.0);
      }
    `;

    const vertexShader = compileShader(gl.VERTEX_SHADER, vertexShaderSource);
    const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

    glProgram = gl.createProgram();
    gl.attachShader(glProgram, vertexShader);
    gl.attachShader(glProgram, fragmentShader);
    gl.linkProgram(glProgram);

    if (!gl.getProgramParameter(glProgram, gl.LINK_STATUS)) {
      console.error('WebGL program link error:', gl.getProgramInfoLog(glProgram));
    }
  }

  function compileShader(type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(shader));
      gl.deleteShader(shader);
      return null;
    }
    return shader;
  }

  function uploadWebGLData(size) {
    const positions = new Float32Array(pixelCount * 2);
    const colors = new Float32Array(pixelCount * 3);
    const srcPos = new Float32Array(pixelCount * 2);
    const deltas = new Float32Array(pixelCount * 2);

    for (let i = 0; i < pixelCount; i++) {
      positions[i * 2] = srcX[i];
      positions[i * 2 + 1] = srcY[i];
      colors[i * 3] = colorsR[i];
      colors[i * 3 + 1] = colorsG[i];
      colors[i * 3 + 2] = colorsB[i];
      srcPos[i * 2] = srcX[i];
      srcPos[i * 2 + 1] = srcY[i];
      deltas[i * 2] = deltaX[i];
      deltas[i * 2 + 1] = deltaY[i];
    }

    glBuffers.position = createBuffer(positions);
    glBuffers.color = createBuffer(colors);
    glBuffers.srcPos = createBuffer(srcPos);
    glBuffers.delta = createBuffer(deltas);
  }

  function createBuffer(data) {
    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
    return buffer;
  }

  function renderWebGL(progress) {
    if (!gl || !glProgram) return;

    const size = imageAData.width;
    canvas.width = size;
    canvas.height = size;

    gl.viewport(0, 0, size, size);
    gl.clearColor(0.04, 0.03, 0.08, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.useProgram(glProgram);

    // Set uniforms
    const progressLoc = gl.getUniformLocation(glProgram, 'u_progress');
    const resolutionLoc = gl.getUniformLocation(glProgram, 'u_resolution');
    gl.uniform1f(progressLoc, progress);
    gl.uniform2f(resolutionLoc, size, size);

    // Bind attributes
    bindAttribute(glBuffers.position, 'a_position', 2);
    bindAttribute(glBuffers.color, 'a_color', 3);
    bindAttribute(glBuffers.srcPos, 'a_srcPos', 2);
    bindAttribute(glBuffers.delta, 'a_delta', 2);

    gl.drawArrays(gl.POINTS, 0, pixelCount);

    // Scale canvas for display
    const ds = getDisplaySize();
    canvas.style.width = ds + 'px';
    canvas.style.height = ds + 'px';
  }

  function bindAttribute(buffer, name, size) {
    const loc = gl.getAttribLocation(glProgram, name);
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, size, gl.FLOAT, false, 0, 0);
  }

  // ── Rendering ─────────────────────────────
  function setCanvasSize(size) {
    canvas.width = size;
    canvas.height = size;
    const ds = getDisplaySize();
    canvas.style.width = ds + 'px';
    canvas.style.height = ds + 'px';
  }

  function renderImageA() {
    if (!imageAData) return;
    if (useWebGL && gl) {
      renderWebGL(0);
    } else {
      setCanvasSize(imageAData.width);
      ctx.putImageData(imageAData, 0, 0);
    }
  }

  function renderFrame(progress) {
    if (pixelCount === 0) return;

    if (useWebGL && gl) {
      renderWebGL(progress);
      return;
    }

    const size = imageAData.width;
    setCanvasSize(size);

    if (!trailOn) {
      const imgData = ctx.createImageData(size, size);
      const buf32 = new Uint32Array(imgData.data.buffer);

      if (bgImgAOn && bgPixels32) {
        buf32.set(bgPixels32);
      } else {
        buf32.fill(BG_DARK);
      }

      for (let i = 0; i < pixelCount; i++) {
        const ix = (srcX[i] + deltaX[i] * progress + 0.5) | 0;
        const iy = (srcY[i] + deltaY[i] * progress + 0.5) | 0;
        if (ix >= 0 && ix < size && iy >= 0 && iy < size) {
          buf32[iy * size + ix] =
            (255 << 24) | (colorsB[i] << 16) | (colorsG[i] << 8) | colorsR[i];
        }
      }
      ctx.putImageData(imgData, 0, 0);
    } else {
      if (!trailCanvas || trailCanvas.width !== size) {
        trailCanvas = document.createElement('canvas');
        trailCanvas.width = size;
        trailCanvas.height = size;
        trailCtx = trailCanvas.getContext('2d');
        if (bgImgAOn && imageAData) {
          trailCtx.putImageData(imageAData, 0, 0);
        } else {
          trailCtx.fillStyle = '#0a0814';
          trailCtx.fillRect(0, 0, size, size);
        }
      }

      trailCtx.globalAlpha = 0.05;
      if (bgImgAOn && imageAData) {
        trailCtx.putImageData(imageAData, 0, 0);
      } else {
        trailCtx.fillStyle = '#0a0814';
        trailCtx.fillRect(0, 0, size, size);
      }
      trailCtx.globalAlpha = 1.0;

      const imgData = ctx.createImageData(size, size);
      const buf32 = new Uint32Array(imgData.data.buffer);
      for (let i = 0; i < pixelCount; i++) {
        const ix = (srcX[i] + deltaX[i] * progress + 0.5) | 0;
        const iy = (srcY[i] + deltaY[i] * progress + 0.5) | 0;
        if (ix >= 0 && ix < size && iy >= 0 && iy < size) {
          buf32[iy * size + ix] =
            (255 << 24) | (colorsB[i] << 16) | (colorsG[i] << 8) | colorsR[i];
        }
      }
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = size;
      tempCanvas.height = size;
      tempCanvas.getContext('2d').putImageData(imgData, 0, 0);
      trailCtx.drawImage(tempCanvas, 0, 0);
      ctx.drawImage(trailCanvas, 0, 0);
    }
  }

  // ── Animation ─────────────────────────────
  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function startAnimation() {
    if (isAnimating || pixelCount === 0) return;
    isAnimating = true;
    trailCanvas = null;
    setControlsDisabled(true);
    statusEl.textContent = '变换中...';
    statusEl.className = 'status animating';
    progressBar.style.width = '0%';

    const duration = getDuration();
    const startTime = performance.now();
    let frameCount = 0;

    function frame(now) {
      const elapsed = now - startTime;
      const raw = Math.min(elapsed / duration, 1);
      const eased = easeInOutCubic(raw);

      renderFrame(eased);
      progressBar.style.width = (raw * 100) + '%';
      frameCount++;

      if (raw < 1) {
        animationId = requestAnimationFrame(frame);
      } else {
        isAnimating = false;
        animationId = null;
        trailCanvas = null;
        setControlsDisabled(false);
        const fps = (frameCount / (elapsed / 1000)).toFixed(0);
        statusEl.textContent = '变换完成！用图片 A 的像素拼出了图片 B 的结构';
        statusEl.className = 'status ready';
        perfEl.textContent = `渲染: ${frameCount} 帧 | ${fps} FPS | ${elapsed.toFixed(0)}ms`;
        setTimeout(() => { progressBar.style.width = '0%'; }, 600);
      }
    }
    animationId = requestAnimationFrame(frame);
  }

  function setControlsDisabled(disabled) {
    btnTransform.disabled = disabled;
    btnReset.disabled = disabled;
    btnExport.disabled = disabled;
    btnGif.disabled = disabled || isRecordingGif;
    btnWebGL.disabled = disabled;
  }

  function resetToA() {
    if (isAnimating) { cancelAnimationFrame(animationId); isAnimating = false; animationId = null; }
    trailCanvas = null;
    renderImageA();
    setControlsDisabled(false);
    statusEl.textContent = '已重置 — 点击"开始变换"查看动画';
    statusEl.className = 'status ready';
    progressBar.style.width = '0%';
  }

  function onBothReady() {
    processImages();
    renderImageA();
    setControlsDisabled(false);
    statusEl.textContent = '准备就绪 — 点击"开始变换"查看动画';
    statusEl.className = 'status ready';
  }

  function reprocessBoth() {
    const size = getResolution();
    if (originalImgA) {
      imageAData = cropAndResize(originalImgA, size);
      infoA.textContent = `已处理: ${size}×${size} 像素`;
    }
    if (originalImgB) {
      imageBData = cropAndResize(originalImgB, size);
      infoB.textContent = `已处理: ${size}×${size} 像素`;
    }
    if (imageAData && imageBData) onBothReady();
  }

  // ── GIF Export ────────────────────────────
  async function exportGif() {
    if (pixelCount === 0 || isRecordingGif) return;
    isRecordingGif = true;
    btnGif.classList.add('recording');
    btnGif.textContent = '🔴 录制中...';
    gifProgress.classList.add('show');

    const duration = getDuration();
    const fps = 20;
    const totalFrames = Math.ceil(duration / 1000 * fps);
    const size = imageAData.width;

    // 创建离屏 Canvas 用于 GIF 渲染
    const offscreen = document.createElement('canvas');
    offscreen.width = size;
    offscreen.height = size;
    const offCtx = offscreen.getContext('2d');

    // 使用 gif.js 编码器
    const gif = new GIF({
      workers: 2,
      quality: 1,
      width: size,
      height: size,
      workerScript: _gifWorkerURL
    });

    gif.on('progress', (p) => {
      const percent = Math.round(p * 100);
      gifProgressBar.style.width = percent + '%';
      gifProgressText.textContent = `编码中... ${percent}%`;
    });

    // 预渲染所有帧并添加到编码器
    for (let i = 0; i <= totalFrames; i++) {
      const progress = i / totalFrames;
      const eased = easeInOutCubic(progress);

      // 渲染到离屏 Canvas
      renderFrameToCtx(offCtx, size, eased);

      gif.addFrame(offCtx, { copy: true, delay: Math.round(1000 / fps) });

      // 更新渲染进度
      const renderPercent = Math.round((i / totalFrames) * 30);
      gifProgressBar.style.width = renderPercent + '%';
      gifProgressText.textContent = `渲染帧 ${i}/${totalFrames}...`;

      // 让 UI 有机会更新
      if (i % 3 === 0) await new Promise(r => setTimeout(r, 0));
    }

    // 渲染并下载
    gif.on('finished', (blob) => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = `pixel-sort-morph-${Date.now()}.gif`;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);

      gifProgress.classList.remove('show');
      btnGif.classList.remove('recording');
      btnGif.textContent = '🎬 导出 GIF';
      isRecordingGif = false;
      setControlsDisabled(false);
      statusEl.textContent = 'GIF 已导出！';
      statusEl.className = 'status ready';
    });

    gif.render();
  }

  // 渲染帧到指定 Canvas 上下文（用于 GIF 导出）
  function renderFrameToCtx(targetCtx, size, progress) {
    if (pixelCount === 0) return;

    const imgData = targetCtx.createImageData(size, size);
    const buf32 = new Uint32Array(imgData.data.buffer);

    // 填充背景
    if (bgImgAOn && bgPixels32) {
      buf32.set(bgPixels32);
    } else {
      buf32.fill(BG_DARK);
    }

    // 绘制像素
    for (let i = 0; i < pixelCount; i++) {
      const ix = (srcX[i] + deltaX[i] * progress + 0.5) | 0;
      const iy = (srcY[i] + deltaY[i] * progress + 0.5) | 0;
      if (ix >= 0 && ix < size && iy >= 0 && iy < size) {
        buf32[iy * size + ix] =
          (255 << 24) | (colorsB[i] << 16) | (colorsG[i] << 8) | colorsR[i];
      }
    }

    targetCtx.putImageData(imgData, 0, 0);
  }

  // ── Export ────────────────────────────────
  function exportImage() {
    if (!canvas.width) return;
    const link = document.createElement('a');
    link.download = `pixel-sort-morph-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    statusEl.textContent = '图片已导出！';
    statusEl.className = 'status ready';
  }

  // ── Upload handling ───────────────────────
  function createUploadHandler(zoneEl, fileInput, infoEl, side) {
    async function handleFile(file) {
      infoEl.textContent = '加载中...';
      try {
        const img = await fileToImage(file);
        if (side === 'A') originalImgA = img;
        else originalImgB = img;

        zoneEl.querySelector('img')?.remove();
        zoneEl.querySelector('.placeholder')?.remove();
        const reader = new FileReader();
        reader.onload = e => {
          const thumb = document.createElement('img');
          thumb.src = e.target.result;
          zoneEl.appendChild(thumb);
        };
        reader.readAsDataURL(file);
        zoneEl.classList.add('has-image');

        const size = getResolution();
        const imageData = cropAndResize(img, size);
        infoEl.textContent = `已处理: ${size}×${size} 像素`;

        if (side === 'A') {
          imageAData = imageData;
          if (imageBData) onBothReady();
          else { statusEl.textContent = '已加载图片 A — 请上传图片 B'; statusEl.className = 'status'; }
        } else {
          imageBData = imageData;
          if (imageAData) onBothReady();
          else { statusEl.textContent = '已加载图片 B — 请上传图片 A'; statusEl.className = 'status'; }
        }
      } catch (err) {
        infoEl.textContent = '加载失败: ' + err.message;
        console.error(err);
      }
    }

    zoneEl.addEventListener('click', () => fileInput.click());
    zoneEl.addEventListener('dragover', e => { e.preventDefault(); zoneEl.style.borderColor = '#6c63ff'; });
    zoneEl.addEventListener('dragleave', () => { zoneEl.style.borderColor = ''; });
    zoneEl.addEventListener('drop', e => {
      e.preventDefault();
      zoneEl.style.borderColor = '';
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });
  }

  createUploadHandler(zoneA, fileA, infoA, 'A');
  createUploadHandler(zoneB, fileB, infoB, 'B');

  // ── Control events ────────────────────────
  resSlider.addEventListener('input', () => {
    resVal.textContent = getResolution() + '×' + getResolution();
  });
  resSlider.addEventListener('change', () => {
    if (isAnimating) return;
    resVal.textContent = getResolution() + '×' + getResolution();
    reprocessBoth();
  });
  sortSelect.addEventListener('change', () => {
    if (isAnimating) return;
    if (imageAData && imageBData) {
      processImages();
      renderImageA();
      statusEl.textContent = '排序方式已更新';
      statusEl.className = 'status ready';
    }
  });

  btnTransform.addEventListener('click', startAnimation);
  btnReset.addEventListener('click', resetToA);
  btnExport.addEventListener('click', exportImage);
  btnGif.addEventListener('click', exportGif);

  btnWebGL.addEventListener('click', () => {
    useWebGL = !useWebGL;
    btnWebGL.classList.toggle('active', useWebGL);
    if (imageAData && imageBData) {
      processImages();
      renderImageA();
    }
  });

  btnTrail.addEventListener('click', () => {
    trailOn = !trailOn;
    btnTrail.classList.toggle('active', trailOn);
    trailCanvas = null;
  });

  btnBgImgA.addEventListener('click', () => {
    bgImgAOn = !bgImgAOn;
    btnBgImgA.classList.toggle('active', bgImgAOn);
    trailCanvas = null;
  });

  window.addEventListener('resize', () => {
    if (imageAData && !isAnimating) {
      if (useWebGL && gl) {
        renderWebGL(0);
      } else {
        setCanvasSize(imageAData.width);
        ctx.putImageData(imageAData, 0, 0);
      }
    }
  });

  // ── Init ──────────────────────────────────
  resVal.textContent = getResolution() + '×' + getResolution();
  setCanvasSize(getResolution());

  // ── 预置渐变图作为图片 A（双色可选）─────────
  function generateGradientImage(size, color1, color2) {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const g = c.getContext('2d');
    const grad = g.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, color1);
    grad.addColorStop(1, color2);
    g.fillStyle = grad;
    g.fillRect(0, 0, size, size);
    return c;
  }

  function loadPresetImageA() {
    const size = getResolution();
    const c1 = gradColor1.value;
    const c2 = gradColor2.value;
    const gradientCanvas = generateGradientImage(size, c1, c2);
    const img = new Image();
    img.onload = () => {
      originalImgA = img;
      imageAData = cropAndResize(img, size);

      // 显示缩略图
      const existing = zoneA.querySelector('img');
      if (existing) existing.remove();
      zoneA.querySelector('.placeholder')?.remove();
      const thumb = document.createElement('img');
      thumb.src = gradientCanvas.toDataURL();
      zoneA.appendChild(thumb);
      zoneA.classList.add('has-image');
      infoA.textContent = `渐变: ${c1} → ${c2} | ${size}×${size}`;

      if (imageBData) {
        processImages();
        renderImageA();
        setControlsDisabled(false);
        statusEl.textContent = '准备就绪 — 点击"开始变换"查看动画';
        statusEl.className = 'status ready';
      } else {
        statusEl.textContent = '已加载渐变图 A — 请上传图片 B';
        statusEl.className = 'status';
      }
    };
    img.src = gradientCanvas.toDataURL();
  }

  // 颜色变更时自动重新生成渐变图
  gradColor1.addEventListener('input', () => { if (!isAnimating) loadPresetImageA(); });
  gradColor2.addEventListener('input', () => { if (!isAnimating) loadPresetImageA(); });

  loadPresetImageA();
})();
</script>

</body>
