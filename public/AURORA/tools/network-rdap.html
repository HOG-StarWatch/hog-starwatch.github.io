<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDAP / WHOIS 查询</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .container { 
            max-width: 1400px; 
            width: 95%;
            margin: 0 auto; 
            background: var(--bg-panel); 
            padding: 25px; 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow); 
            border: 1px solid var(--border);
        }
        
        h2 { 
            margin-top: 0; 
            color: var(--primary); 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .ver { font-size: 12px; color: var(--text-dim); }
        .section { margin-bottom: 20px; }
        
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        select, input, textarea { 
            background: var(--bg-input); 
            color: var(--text-main); 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: var(--radius-sm); 
            font-size: 15px; 
        }
        select { flex: 1; cursor: pointer; }
        input { flex: 2; }
        textarea { 
            width: 100%; 
            height: 180px; 
            font-family: var(--font-mono); 
            font-size: 12px; 
            resize: vertical; 
            border-color: var(--border); 
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
        }

        button { 
            padding: 10px 20px; 
            cursor: pointer; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: var(--radius-sm); 
            font-weight: 600; 
            transition: 0.2s; 
        }
        button:hover { opacity: 0.9; }
        .btn-sec { background: var(--bg-hover); color: var(--text-main); border: 1px solid var(--border); }
        .btn-sec:hover { background: var(--bg-active); }
        .btn-parse { background: var(--success); width: 100%; margin-top: 10px; font-size: 16px; }
        .btn-export { background: var(--warning); color: #000; }
        .btn-export:hover { background: #e0a800; }

        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { 
            background: var(--bg-deep); 
            padding: 15px; 
            border-radius: var(--radius-md); 
            border-left: 4px solid var(--primary); 
            transition: transform 0.2s; 
            border: 1px solid var(--border);
        }
        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .card-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; margin-bottom: 5px; }
        .card-val { font-size: 14px; word-break: break-all; color: var(--text-main); font-weight: 500; font-family: var(--font-mono); }

        .status { color: var(--warning); font-size: 13px; margin: 10px 0; min-height: 20px; }
        .hidden { display: none; }
        
        .hint { 
            background: rgba(255, 0, 0, 0.1); 
            padding: 15px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--error); 
            color: var(--error); 
            font-size: 14px; 
            margin-top: 15px; 
        }
    </style>
</head>
<body class="scroll-content">

<div class="container">
    <h2>RDAP / WHOIS 查询 <span class="ver">v2.0</span></h2>
    
    <div class="section">
        <div class="row">
            <select id="nodeSelect">
                <option value="https://rdap.org/domain/">rdap.org (默认递归查询)</option>
                <option value="https://rdap.cnnic.cn/domain/">rdap.cnnic.cn (中国 .CN)</option>
                <option value="https://rdap.verisign.com/com/v1/domain/">rdap.verisign.com (.COM)</option>
                <option value="https://rdap.verisign.com/net/v1/domain/">rdap.verisign.com (.NET)</option>
                <option value="https://rdap.publicinterestregistry.org/rdap/domain/">pir.org (.ORG)</option>
                <option value="https://rdap.nic.ad.jp/domain/">nic.ad.jp (.JP)</option>
            </select>
            <button class="btn-sec" id="btn-open-node-root">访问节点根目录</button>
        </div>
        <div class="row">
            <input type="text" id="domainInput" placeholder="输入域名 (例如: 123.com 或 apple.net)">
            <button id="btn-do-search">在线获取并解析</button>
        </div>
        <div id="status" class="status"></div>
    </div>

    <div class="section">
        <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 8px; display: flex; justify-content: space-between;">
            <span>JSON 数据交互区 (获取到的数据会自动填入此处)：</span>
            <span id="dataInfo" style="color:var(--success)"></span>
        </p>
        <textarea id="jsonInput" placeholder='等待获取数据或在此粘贴 JSON 代码...'></textarea>
        
        <div style="display: flex; gap: 10px;">
            <button class="btn-parse" id="btn-parse-json">解析文本框中的 JSON</button>
            <button id="exportBtn" class="btn-export btn-parse hidden">导出为 .json 文件</button>
        </div>
    </div>

    <div id="toolBar" class="hidden" style="margin-bottom:15px; border-top: 1px solid var(--border); padding-top: 15px;">
        <button class="btn-sec" id="apiUrlBtn">🌐 打开原始 API 页面</button>
        <button class="btn-sec" id="btn-clear-all">清空全部</button>
    </div>

    <div id="parseResult"></div>
</div>

<script src="../js/app.js"></script>
<script>
    const rdapTool = (() => {
        let currentFullUrl = "";
        let lastFetchedData = null;

        function openNodeRoot() {
        const root = document.getElementById('nodeSelect').value.split('domain/')[0];
        window.open(root, '_blank');
    }

    function updateStatus(msg) {
        document.getElementById('status').innerText = msg;
    }

    // 核心渲染函数
    function renderRdapData(data) {
        const resultDiv = document.getElementById('parseResult');
        const exportBtn = document.getElementById('exportBtn');
        const toolBar = document.getElementById('toolBar');
        
        // 1. 同步显示到文本框
        document.getElementById('jsonInput').value = JSON.stringify(data, null, 2);
        lastFetchedData = data;

        // 2. 显示工具栏和下载按钮
        toolBar.classList.remove('hidden');
        exportBtn.classList.remove('hidden');

        // 3. 提取字段逻辑
        const getRegistrar = () => {
            const ent = data.entities?.find(e => e.roles?.includes('registrar'));
            return ent?.vcardArray?.[1]?.find(i => i[0]==='fn')?.[3] || ent?.handle || "未知";
        };

        const infoItems = [
            { label: "域名主体", val: data.ldhName },
            { label: "注册商", val: getRegistrar() },
            { label: "状态 (Status)", val: (data.status || []).join(' / ') },
            { label: "WHOIS 服务器", val: data.port43 },
        ];

        // 提取时间点
        const events = (data.events || []).map(e => ({
            label: `时间点: ${e.eventAction}`,
            val: new Date(e.eventDate).toLocaleString()
        }));

        const allItems = [...infoItems, ...events];

        let html = '<div class="result-grid">';
        allItems.forEach(item => {
            if(item.val) {
                html += `<div class="card">
                    <div class="card-label">${item.label}</div>
                    <div class="card-val">${item.val}</div>
                </div>`;
            }
        });
        html += '</div>';
        resultDiv.innerHTML = html;
        document.getElementById('dataInfo').innerText = "数据已同步至解析器";
    }

    // 在线查询
    async function doSearch() {
        const domain = document.getElementById('domainInput').value.trim();
        const server = document.getElementById('nodeSelect').value;
        
        if (!domain) if (app && app.showToast) { app.showToast('', 'error'); return; }

        rdapTool.updateStatus("🚀 正在请求 API 数据...");
        document.getElementById('parseResult').innerHTML = "";
        document.getElementById('dataInfo').innerText = "";
        currentFullUrl = server + domain;

        try {
            const response = await fetch(currentFullUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            rdapTool.updateStatus("✅ 获取成功");
            rdapTool.renderRdapData(data);
        } catch (err) {
            rdapTool.updateStatus("❌ 自动获取失败 (CORS跨域限制或域名不存在)");
            document.getElementById('parseResult').innerHTML = `
                <div class="hint">
                    <b>受浏览器安全政策影响，自动解析失败。</b><br>
                    请执行以下步骤：<br>
                    1. 点击下方的蓝色按钮打开 API 页面。<br>
                    2. <b>全选并复制</b> 页面上的所有代码。<br>
                    3. 粘贴到中间文本框后点击 <b>“解析文本框中的 JSON”</b>。
                </div>`;
            document.getElementById('toolBar').classList.remove('hidden');
            document.getElementById('apiUrlBtn').classList.remove('hidden');
        }
    }

    // 手动解析
    function parseManualJson() {
        const input = document.getElementById('jsonInput').value;
        if(!input) if (app && app.showToast) { app.showToast('', 'error'); return; }
        try {
            const data = JSON.parse(input);
            rdapTool.updateStatus("本地解析完成");
            rdapTool.renderRdapData(data);
        } catch (e) {
            if (app && app.showToast) app.showToast('', 'error');
        }
    }

    // 导出文件功能
    function exportJsonFile() {
        if(!lastFetchedData) return;
        const dataStr = JSON.stringify(lastFetchedData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `rdap_${lastFetchedData.ldhName || 'export'}.json`;
        link.click();
        URL.revokeObjectURL(url);
    }

    function clearAll() {
        document.getElementById('jsonInput').value = "";
        document.getElementById('domainInput').value = "";
        document.getElementById('parseResult').innerHTML = "";
        document.getElementById('toolBar').classList.add('hidden');
        document.getElementById('exportBtn').classList.add('hidden');
        document.getElementById('dataInfo').innerText = "";
        rdapTool.updateStatus("");
        lastFetchedData = null;
    }

    // Event listeners
        document.getElementById('btn-open-node-root').addEventListener('click', rdapTool.openNodeRoot);
        document.getElementById('btn-do-search').addEventListener('click', rdapTool.doSearch);
        document.getElementById('btn-parse-json').addEventListener('click', rdapTool.parseManualJson);
        document.getElementById('exportBtn').addEventListener('click', rdapTool.exportJsonFile);
        document.getElementById('apiUrlBtn').addEventListener('click', function() {
            window.open(currentFullUrl, '_blank');
        });
        document.getElementById('btn-clear-all').addEventListener('click', rdapTool.clearAll);

        return { openNodeRoot, updateStatus, renderRdapData, doSearch, parseManualJson, exportJsonFile, clearAll };
    })();
</script>

    <div id="toast"></div>
</body>
</html>
