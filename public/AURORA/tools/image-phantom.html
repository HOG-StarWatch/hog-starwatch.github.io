<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骞诲奖鍧﹀厠鐢熸垚鍣?/title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .scroll-content {
            padding: 1.5rem;
        }

        .layout-sidebar {
            display: flex;
            gap: 1.5rem;
            height: auto;
            min-height: calc(100vh - 3rem);
        }

        .controls {
            flex: 0 0 380px;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .phantom-panel-header {
            padding: 0;
            margin-bottom: 0.5rem;
            background: transparent;
        }

        .phantom-panel-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-90);
        }

        .mode-switch-container {
            background: var(--card-bg, rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 0.75rem;
        }

        .mode-switch-wrapper {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .mode-switch-btn {
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #fff;
            transition: all 150ms;
            border: none;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
        }

        .mode-switch-btn:active {
            transform: scale(0.95);
        }

        .mode-switch-btn.is-active {
            background-color: var(--primary);
            color: #fff;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .mode-description {
            margin-top: 0.75rem;
            font-size: 0.875rem;
            line-height: 1.5;
            color: var(--text-50);
        }

        .control-section {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.25rem;
        }

        .control-section h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-90);
            margin-bottom: 0.75rem;
        }

        .zone-label {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            display: block;
            font-size: 0.95rem;
        }

        .phantom-upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 1rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 1.25rem;
            text-align: center;
            cursor: pointer;
            transition: all 150ms;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .phantom-upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-placeholder {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .upload-placeholder small {
            color: var(--text-50);
        }

        .phantom-upload-area img {
            max-height: 80px;
            max-width: 100%;
            object-fit: contain;
            display: none;
            border-radius: 0.5rem;
        }

        .phantom-upload-area img.is-visible {
            display: block;
        }

        .upload-info {
            font-size: 0.75rem;
            color: var(--text-50);
            margin-top: 0.5rem;
            word-break: break-all;
        }

        .param-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .param-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 1rem;
        }

        .param-box h4 {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-90);
            margin-bottom: 0.75rem;
        }

        .param-row {
            margin-bottom: 0.75rem;
        }

        .param-row:last-child {
            margin-bottom: 0;
        }

        .param-row label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-50);
            margin-bottom: 0.25rem;
        }

        .param-row label span:last-child {
            font-family: ui-monospace, monospace;
            color: var(--text-90);
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .checkbox-row label {
            font-size: 0.875rem;
            color: var(--text-90);
        }

        .checkbox-row input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            accent-color: var(--primary);
        }

        .hint-text {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 0.5rem;
            line-height: 1.4;
        }

        input[type="range"] {
            width: 100%;
            height: 0.5rem;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 0.25rem;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            background: var(--primary);
            margin-top: -0.25rem;
        }

        .phantom-btn-primary {
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 150ms;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .phantom-btn-primary:hover {
            filter: brightness(1.1);
        }

        .phantom-btn-primary:active {
            transform: scale(0.98);
        }

        .phantom-btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-90);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.75rem 1.25rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 150ms;
        }

        .btn-success:hover {
            border-color: var(--primary);
            color: #fff;
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: auto;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            min-height: 400px;
            position: relative;
            overflow: hidden;
        }

        .canvas-container canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .bg-white-preview { background: #fff !important; }
        .bg-black-preview { background: #000 !important; }

        .preview-controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            align-items: center;
        }

        .preview-controls label {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            cursor: pointer;
        }

        .preview-controls input[type="radio"] {
            accent-color: var(--primary);
        }

        .result-placeholder {
            text-align: center;
            color: var(--text-dim);
        }

        .result-placeholder i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .status-message {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.8rem;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-50);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fecaca;
        }

        .shadow-result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            width: 100%;
        }

        .shadow-result-item {
            border-radius: 0.75rem;
            padding: 0.75rem;
            text-align: center;
        }

        .shadow-result-item.white-bg {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .shadow-result-item.black-bg {
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shadow-result-item p {
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .shadow-result-item.white-bg p {
            color: rgba(0, 0, 0, 0.75);
        }

        .shadow-result-item.black-bg p {
            color: rgba(255, 255, 255, 0.8);
        }

        .shadow-result-item img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 0.5rem;
            object-fit: contain;
        }

        .shadow-result-item.white-bg img {
            background: #fff;
        }

        .shadow-result-item.black-bg img {
            background: #000;
        }

        .size-mismatch-warning {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.8rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.25);
            color: #fef3c7;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .layout-sidebar {
                flex-direction: column;
                height: auto !important;
            }

            .controls {
                flex: none;
                max-width: 100%;
            }

            .param-grid {
                grid-template-columns: 1fr;
            }

            .shadow-result-grid {
                grid-template-columns: 1fr;
            }

            .preview-area {
                min-height: 400px;
            }
        }
    </style>
</head>
<body class="scroll-content">
    <div class="layout-sidebar">
        <div class="controls">
            <div class="phantom-panel-header">
                <div class="phantom-panel-title">
                    <i class="fas fa-ghost"></i> 骞诲奖鍧﹀厠
                </div>
            </div>

            <div class="mode-switch-container">
                <div class="mode-switch-wrapper">
                    <button type="button" id="btn-prism" class="mode-switch-btn is-active" data-mode="prism">
                        鍏夋１鍧﹀厠
                    </button>
                    <button type="button" id="btn-shadow" class="mode-switch-btn" data-mode="shadow">
                        骞诲奖鍧﹀厠
                    </button>
                </div>
                <p id="mode-description" class="mode-description"></p>
            </div>

            <div class="control-section">
                <h3><i class="fas fa-upload"></i> 涓婁紶鍥剧墖</h3>
                <p id="upload-hint" style="font-size: 0.8rem; color: var(--text-50); margin-bottom: 1rem;"></p>

                <div class="control-group">
                    <span class="zone-label" id="source-label"></span>
                    <div class="phantom-upload-area" id="upload-area-1">
                        <div id="preview1-placeholder" class="upload-placeholder">
                            <span id="source-cta"></span>
                            <small id="source-hint"></small>
                        </div>
                        <img id="preview1">
                    </div>
                    <input type="file" id="imgInput1" accept="image/*" hidden>
                    <p id="preview1-info" class="upload-info hidden"></p>
                </div>

                <div class="control-group" style="margin-top: 1rem;">
                    <span class="zone-label" id="hidden-label"></span>
                    <div class="phantom-upload-area" id="upload-area-2">
                        <div id="preview2-placeholder" class="upload-placeholder">
                            <span id="hidden-cta"></span>
                            <small id="hidden-hint"></small>
                        </div>
                        <img id="preview2">
                    </div>
                    <input type="file" id="imgInput2" accept="image/*" hidden>
                    <p id="preview2-info" class="upload-info hidden"></p>
                </div>
            </div>

            <div id="prism-controls" class="control-section">
                <h3><i class="fas fa-sliders-h"></i> 鍙傛暟涓庢搷浣?/h3>
                <div class="param-grid">
                    <div class="param-box">
                        <h4>鍘熷浘鍙傛暟</h4>
                        <div class="param-row">
                            <label><span>鍘熷浘浜害鎻愰珮 (%)</span><span id="source-brightness-val">100</span></label>
                            <input type="range" id="source-brightness" min="0" max="200" step="1" value="100">
                        </div>
                        <div class="param-row">
                            <label><span>鍘熷浘瀵规瘮搴?(%)</span><span id="source-contrast-val">20</span></label>
                            <input type="range" id="source-contrast" min="10" max="300" step="1" value="20">
                        </div>
                    </div>
                    <div class="param-box">
                        <h4>闅愯棌鍥惧弬鏁?/h4>
                        <div class="param-row">
                            <label><span>闅愯棌鍥句寒搴﹂檷浣?(%)</span><span id="hidden-brightness-val">90</span></label>
                            <input type="range" id="hidden-brightness" min="0" max="100" step="1" value="90">
                        </div>
                        <div class="param-row">
                            <label><span>闅愯棌鍥惧姣斿害 (%)</span><span id="hidden-contrast-val">100</span></label>
                            <input type="range" id="hidden-contrast" min="10" max="300" step="1" value="100">
                        </div>
                    </div>
                </div>
            </div>

            <div id="shadow-controls" class="control-section hidden">

                    <div class="param-box">
                        <div class="checkbox-row" style="margin-bottom: 1rem;">

                            <input type="checkbox" id="shadow-is-colored" checked>
                        </div>
                        <div class="param-row">

                        <div class="param-row">
                            <label><span>榛戝簳鍥惧幓鑹?/span><span id="shadow-inner-desat-val">0.00</span></label>

                        <div class="param-row">
                            <label><span>榛戝簳鍥炬贩鍚堟潈閲?/span><span id="shadow-inner-weight-val">0.70</span></label>
                            <input type="range" id="shadow-inner-weight" min="0" max="1" step="0.02" value="0.70">
                        </div>
                    </div>
                    <div class="param-box">
                        <div class="param-row">
                            <label><span>鐧藉簳鍥剧缉鏀?/span><span id="shadow-cover-scale-val">0.20</span></label>
                            <input type="range" id="shadow-cover-scale" min="0" max="1" step="0.02" value="0.20">
                        </div>
                        <div class="param-row">
                            <label><span>鐧藉簳鍥惧幓鑹?/span><span id="shadow-cover-desat-val">0.00</span></label>
                            <input type="range" id="shadow-cover-desat" min="0" max="1" step="0.02" value="0.00">
                        </div>
                        <div class="param-row">
                            <label><span>鏈€澶ц緭鍑哄昂瀵?/span><span id="shadow-max-size-val">1200</span></label>
                            <input type="range" id="shadow-max-size" min="0" max="4096" step="1" value="1200">
                        </div>

                    </div>
                </div>
            </div>

            <div id="size-mismatch" class="size-mismatch-warning hidden"></div>

            <div class="action-buttons">
                <button class="phantom-btn-primary" id="generate-btn" disabled>
                    <i class="fas fa-magic"></i> 鐢熸垚鍥惧儚
                </button>
                <button class="btn-success" id="download-btn" disabled>
                    <i class="fas fa-download"></i> 涓嬭浇 PNG
                </button>
            </div>
        </div>

        <div class="preview-area">
            <div class="canvas-container bg-checkerboard" id="canvasContainer">
                <div id="resultPlaceholder" class="result-placeholder">
                    <i class="fas fa-image"></i>
                    <div>鐢熸垚缁撴灉灏嗘樉绀哄湪杩欓噷</div>
                    <div style="font-size:0.8rem; margin-top:5px;">璇蜂笂浼犱袱寮犲浘鐗囧悗鐢熸垚</div>
                </div>
                <canvas id="resultCanvas" style="display:none;"></canvas>
                <div id="shadow-result-grid" class="shadow-result-grid hidden">
                    <div class="shadow-result-item white-bg">
                        <p>鐧藉簳棰勮</p>
                        <img id="result-img-white" src="" alt="鐧藉簳棰勮">
                    </div>
                    <div class="shadow-result-item black-bg">
                        <p>榛戝簳棰勮</p>
                        <img id="result-img-black" src="" alt="榛戝簳棰勮">
                    </div>
                </div>
            </div>

            <div id="prism-result" class="preview-controls">
                <label><input type="radio" name="bg" id="bg-white" data-bg="white"> 鐧藉簳棰勮</label>
                <label><input type="radio" name="bg" id="bg-black" data-bg="black"> 榛戝簳棰勮</label>
                <label><input type="radio" name="bg" id="bg-check" data-bg="check" checked> 閫忔槑棰勮</label>
            </div>

            <div id="shadow-result" class="preview-controls hidden">
                <span style="color: var(--text-50);">骞诲奖鍧﹀厠妯″紡鎻愪緵鐧藉簳/榛戝簳鍙岄瑙?/span>
            </div>

            <div id="status-message" class="status-message"></div>
            <div id="error-message" class="status-message error-message hidden"></div>
            <p id="output-size" style="margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-50);" class="hidden"></p>
        </div>
    </div>

    <script src="../js/app.js"></script>

                        const hiddenBrightnessFactor = 1 - hiddenBrightness / 100;
                        const originalContrastFactor = sourceContrast / 100;
                        const hiddenContrastFactor = hiddenContrast / 100;

                            const pixelIndex = i / 4;
                            const x = pixelIndex % w;
                            const y = Math.floor(pixelIndex / w);

                            const adjustPixel = (r, g, b, brightnessFactor, contrastFactor) => {
                                const brightR = r * brightnessFactor;
                                const brightG = g * brightnessFactor;
                                const brightB = b * brightnessFactor;
                                const adjustContrast = (value) => phantomTool.clamp((value - 128) * contrastFactor + 128, 0, 255);
                                return [adjustContrast(brightR), adjustContrast(brightG), adjustContrast(brightB)];
                            };

                            if ((x + y) % 2 === 0) {
                                const pixel = adjustPixel(d1[i], d1[i + 1], d1[i + 2], originalBrightnessFactor, originalContrastFactor);
                                dOut[i] = pixel[0];
                                dOut[i + 1] = pixel[1];
                                dOut[i + 2] = pixel[2];
                            } else {
                                const pixel = adjustPixel(d2[i], d2[i + 1], d2[i + 2], hiddenBrightnessFactor, hiddenContrastFactor);
                                dOut[i] = pixel[0];
                                dOut[i + 1] = pixel[1];
                                dOut[i + 2] = pixel[2];
                            }

                        }

            () {

                        const coverGray = new Uint8ClampedArray(d2.length / 4);

                            coverGray[idx] = 0.299 * d2[i] + 0.587 * d2[i + 1] + 0.114 * d2[i + 2];
                        }

                        const innerScale = shadowInnerScale;
                        const coverScale = 1 - shadowCoverScale;

                        if (shadowIsColored) {
                            const innerCache = new Uint8ClampedArray(innerPixels.length);
                            const coverCache = new Uint8ClampedArray(coverPixels.length);
                            const alphaCache = new Float32Array(innerGray.length);

                            for (let i = 0; i < innerPixels.length; i += 4) {
                                const gray = innerGray[i >> 2] * innerScale;
                                const r = innerPixels[i] * innerScale;
                                const g = innerPixels[i + 1] * innerScale;
                                const b = innerPixels[i + 2] * innerScale;
                                innerCache[i] = r + (gray - r) * shadowInnerDesat;
                                innerCache[i + 1] = g + (gray - g) * shadowInnerDesat;
                                innerCache[i + 2] = b + (gray - b) * shadowInnerDesat;
                            }

                                const gray = 255 - (255 - coverGray[i >> 2]) * coverScale;
                                const r = 255 - (255 - coverPixels[i]) * coverScale;
                                const g = 255 - (255 - coverPixels[i + 1]) * coverScale;
                                const b = 255 - (255 - coverPixels[i + 2]) * coverScale;
                                coverCache[i] = r + (gray - r) * shadowCoverDesat;
                                coverCache[i + 1] = g + (gray - g) * shadowCoverDesat;
                                coverCache[i + 2] = b + (gray - b) * shadowCoverDesat;
                            }

                                alphaCache[i] = Math.min(Math.max((255 + innerGray[i] * innerScale - (255 - (255 - coverGray[i]) * coverScale)) / 255, 0), 1);
                            }

                                outputData[i + 3] = phantomTool.clamp(255 * alpha, 0, 255);
